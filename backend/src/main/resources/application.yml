spring:
  profiles:
    active: local
  application:
    name: reel
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 26MB
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

jwt:
  access-token-expiry-ms: 1800000    # 30분
  refresh-token-expiry-ms: 1209600000 # 14일

anthropic:
  model: llama-3.3-70b-versatile
  max-tokens: 1000
  api-url: https://api.groq.com/openai/v1

upload:
  path: uploads

logging:
  level:
    com.reel: DEBUG

---
spring:
  config:
    activate:
      on-profile: local
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
